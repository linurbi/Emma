<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#08001a"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#f72fed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.6"/>

  <!-- Robot face -->
  <rect x="156" y="156" width="200" height="180" rx="30" fill="url(#glow)" opacity="0.9"/>
  <!-- Eyes -->
  <circle cx="210" cy="230" r="22" fill="#ffffff"/>
  <circle cx="302" cy="230" r="22" fill="#ffffff"/>
  <circle cx="216" cy="236" r="12" fill="#08001a"/>
  <circle cx="308" cy="236" r="12" fill="#08001a"/>
  <!-- Mouth -->
  <rect x="195" y="295" width="122" height="22" rx="11" fill="#ffffff" opacity="0.85"/>
  <!-- Antenna -->
  <rect x="248" y="110" width="16" height="50" rx="8" fill="url(#glow)"/>
  <circle cx="256" cy="100" r="18" fill="#00f5d4"/>

  <!-- Question mark -->
  <text x="256" y="395" font-family="Arial, sans-serif" font-size="90" font-weight="900"
        text-anchor="middle" fill="#ffdd00" opacity="0.9">?</text>
</svg>
